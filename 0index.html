!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASA: Eternal Red Bouquet - Mobile Masterpiece</title>
    <style>
        :root {
            /* Paleta de Cores de Luxo Absoluto */
            --bg-core: #0f0005;
            --bg-outer: #000000;
            --nebula-red: #4a000d;
            
            --rose-dark: #3a0000;
            --rose-mid: #990011;
            --rose-light: #ff002b;
            --rose-glow: rgba(255, 0, 50, 0.5);
            
            --stem-color: #0a1f0a;
            --gold-light: #ffea70;
            --gold-mid: #d4af37;
            --gold-dark: #8b6508;
            
            --wrap-dark: rgba(10, 0, 5, 0.9);
            --wrap-light: rgba(30, 0, 10, 0.6);
            --wrap-border: rgba(212, 175, 55, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 40%, var(--nebula-red) 0%, var(--bg-core) 35%, var(--bg-outer) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Times New Roman', serif;
            perspective: 1200px;
            /* Evita scroll elástico no mobile */
            touch-action: none; 
        }

        /* ----- UNIVERSO PROFUNDO ----- */
        .universe {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--d) ease-in-out infinite alternate;
        }

        .aura-magica {
            position: absolute;
            top: 50%; left: 50%;
            width: 80vmin; height: 80vmin;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, var(--rose-glow) 0%, transparent 60%);
            filter: blur(50px);
            opacity: 0.5;
            animation: pulseAura 6s ease-in-out infinite alternate;
            z-index: 1;
            pointer-events: none;
        }

        /* ----- MOTOR 3D DO BUQUÊ ----- */
        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            z-index: 2;
            /* Efeito de flutuação suave do conjunto todo */
            animation: floatBouquet 8s ease-in-out infinite;
        }

        .bouquet-container {
            position: relative;
            width: 0; height: 0;
            transform-style: preserve-3d;
            transform: rotateX(15deg); 
        }

        /* Centro de rotação do buquê */
        .bouquet-pivot {
            position: absolute;
            bottom: -100px;
            transform-style: preserve-3d;
            /* Rotação automática suave se o usuário não interagir */
            animation: autoRotate 40s linear infinite;
        }

        /* ----- ROSAS 3D ----- */
        .flower-stem-wrapper {
            position: absolute;
            bottom: 0; left: 0;
            width: 2px;
            transform-origin: bottom center;
            transform-style: preserve-3d;
        }

        .stem {
            position: absolute;
            bottom: 0; left: -1px;
            width: 4px;
            height: var(--h);
            background: linear-gradient(to top, #000, var(--stem-color), #143314);
            border-radius: 2px;
            box-shadow: inset -1px 0 3px rgba(0,0,0,0.9);
        }

        .rose-bloom {
            position: absolute;
            bottom: var(--h);
            left: 0;
            width: 0; height: 0;
            transform-style: preserve-3d;
            transform: rotateX(-90deg); 
        }

        .petal {
            position: absolute;
            bottom: 0; right: 0;
            width: var(--s);
            height: var(--s);
            /* Gradiente de veludo */
            background: linear-gradient(135deg, var(--rose-light) 0%, var(--rose-mid) 50%, var(--rose-dark) 100%);
            border-radius: 50% 0 50% 50%;
            transform-origin: bottom right;
            box-shadow: 
                inset 2px 2px 6px rgba(0,0,0,0.4), 
                inset -1px -1px 4px rgba(255,150,150,0.2),
                0 0 5px rgba(0,0,0,0.6);
            border: 0.5px solid rgba(255, 50, 50, 0.15);
            backface-visibility: visible;
        }

        .rose-center {
            position: absolute;
            bottom: 0; right: 0;
            width: 12px; height: 12px;
            background: #2a0000;
            border-radius: 50%;
            transform: translate(50%, 50%);
            box-shadow: 0 0 20px 8px var(--rose-dark);
        }

        /* ----- EMBALAGEM DE LUXO ----- */
        .wrapper-back, .wrapper-front {
            position: absolute;
            bottom: -50px;
            left: -140px;
            width: 280px;
            height: 380px;
            transform-origin: bottom center;
        }

        .wrapper-back {
            background: linear-gradient(to top, #050002, var(--wrap-light));
            clip-path: polygon(20% 0, 80% 0, 55% 100%, 45% 100%);
            transform: translateZ(-35px) rotateX(-12deg);
            filter: brightness(0.3);
        }

        .wrapper-front {
            background: linear-gradient(145deg, rgba(20,0,5,0.95), rgba(40,0,10,0.8));
            clip-path: polygon(0 0, 100% 0, 55% 100%, 45% 100%);
            transform: translateZ(35px) rotateX(8deg);
            border-top: 2px solid var(--wrap-border);
            box-shadow: 0 -10px 40px rgba(255,0,50,0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* Fios de ouro na embalagem */
        .wrapper-front::before, .wrapper-front::after {
            content: ''; position: absolute;
            background: linear-gradient(to bottom, transparent, var(--gold-mid), transparent);
            width: 1px; height: 100%; top: 0;
            opacity: 0.5;
        }
        .wrapper-front::before { left: 20%; transform: rotate(10deg); }
        .wrapper-front::after { right: 20%; transform: rotate(-10deg); }

        /* ----- O NOVO LAÇO DE SEDA (Masterpiece) ----- */
        .luxury-ribbon {
            position: absolute;
            bottom: 40px; /* Posição perfeita na embalagem */
            left: 50%;
            transform: translateX(-50%) translateZ(40px); /* À frente da embalagem */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6));
        }

        /* Nó central do laço */
        .ribbon-knot {
            width: 30px; height: 35px;
            background: radial-gradient(ellipse at center, var(--gold-light) 0%, var(--gold-mid) 40%, var(--gold-dark) 100%);
            border-radius: 10px;
            z-index: 3;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* Asas do Laço (Loops) */
        .ribbon-wings {
            position: absolute;
            top: 2px;
            width: 180px;
            display: flex;
            justify-content: space-between;
            z-index: 2;
        }

        .wing {
            width: 85px; height: 45px;
            background: linear-gradient(45deg, var(--rose-mid), var(--rose-dark));
            border: 2px solid var(--gold-mid);
            border-radius: 50px;
            box-shadow: inset 0 5px 15px rgba(255,255,255,0.2), inset 0 -5px 15px rgba(0,0,0,0.5);
            position: relative;
        }
        .wing.left { transform: rotate(-10deg) translateX(15px); border-right: none; }
        .wing.right { transform: rotate(10deg) translateX(-15px); border-left: none; }

        /* Fitas caídas esvoaçantes */
        .ribbon-tails {
            position: absolute;
            top: 25px;
            display: flex;
            gap: 10px;
            z-index: 1;
        }

        .tail {
            width: 20px;
            height: 140px;
            background: linear-gradient(to bottom, var(--rose-dark), var(--rose-mid), transparent);
            border-left: 1px solid rgba(212, 175, 55, 0.5);
            border-right: 1px solid rgba(212, 175, 55, 0.5);
            transform-origin: top center;
            border-radius: 0 0 10px 10px;
        }
        
        /* Animação física suave nas fitas */
        .tail.left { 
            transform: rotate(15deg); 
            animation: swayTailLeft 3s ease-in-out infinite alternate;
        }
        .tail.right { 
            transform: rotate(-15deg); 
            animation: swayTailRight 3.5s ease-in-out infinite alternate;
        }

        /* ----- FAGULHAS / EMBERS ----- */
        .ember {
            position: absolute;
            bottom: -50px;
            border-radius: 50%;
            background: var(--gold-light);
            box-shadow: 0 0 10px var(--gold-light), 0 0 20px var(--rose-light);
            opacity: 0;
            animation: rise var(--dur) ease-in infinite;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        /* ----- ANIMAÇÕES ----- */
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5); box-shadow: 0 0 2px white; }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 15px white; }
        }

        @keyframes pulseAura {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.6; }
        }

        @keyframes autoRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes floatBouquet {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes swayTailLeft {
            0% { transform: rotate(12deg) skewX(2deg); }
            100% { transform: rotate(20deg) skewX(-2deg); }
        }

        @keyframes swayTailRight {
            0% { transform: rotate(-12deg) skewX(-2deg); }
            100% { transform: rotate(-20deg) skewX(2deg); }
        }

        @keyframes rise {
            0% { 
                transform: translate3d(var(--startX), 0, var(--startZ)) scale(0);
                opacity: 0;
            }
            15% { opacity: 1; }
            80% { opacity: 0.6; }
            100% { 
                transform: translate3d(var(--endX), -90vh, var(--endZ)) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="universe" id="universe"></div>
    <div class="aura-magica"></div>

    <div class="scene" id="scene">
        <div class="bouquet-container" id="bouquetContainer">
            <div class="wrapper-back"></div>
            
            <div class="bouquet-pivot" id="bouquetPivot">
                <!-- Rosas geradas via JS -->
            </div>

            <div class="wrapper-front">
                <!-- O Laço Masterpiece ancorado na frente -->
                <div class="luxury-ribbon">
                    <div class="ribbon-wings">
                        <div class="wing left"></div>
                        <div class="wing right"></div>
                    </div>
                    <div class="ribbon-tails">
                        <div class="tail left"></div>
                        <div class="tail right"></div>
                    </div>
                    <div class="ribbon-knot"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const universe = document.getElementById('universe');
        const bouquetPivot = document.getElementById('bouquetPivot');
        const bouquetContainer = document.getElementById('bouquetContainer');
        const scene = document.getElementById('scene');

        // 1. Estrelas Aprimoradas
        const starColors = ['#ffffff', '#ffccd5', '#ff4d6d', '#ffd700'];
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            const size = Math.random() * 2.5 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.backgroundColor = starColors[Math.floor(Math.random() * starColors.length)];
            star.style.setProperty('--d', (Math.random() * 2 + 1.5) + 's');
            star.style.animationDelay = (Math.random() * 5) + 's';
            universe.appendChild(star);
        }

        // 2. Fagulhas Mágicas Otimizadas
        for (let i = 0; i < 35; i++) {
            const ember = document.createElement('div');
            ember.className = 'ember';
            const size = Math.random() * 3 + 1.5;
            ember.style.width = size + 'px';
            ember.style.height = size + 'px';
            ember.style.setProperty('--dur', (Math.random() * 5 + 5) + 's');
            ember.style.animationDelay = (Math.random() * 5) + 's';
            
            const startX = (Math.random() - 0.5) * 150;
            const startZ = (Math.random() - 0.5) * 150;
            const endX = startX + (Math.random() - 0.5) * 400;
            const endZ = startZ + (Math.random() - 0.5) * 400;
            
            ember.style.setProperty('--startX', startX + 'px');
            ember.style.setProperty('--startZ', startZ + 'px');
            ember.style.setProperty('--endX', endX + 'px');
            ember.style.setProperty('--endZ', endZ + 'px');
            
            bouquetContainer.appendChild(ember);
        }

        // 3. Gerador de Rosas Otimizado para Mobile
        function createRose() {
            const bloom = document.createElement('div');
            bloom.className = 'rose-bloom';
            
            const center = document.createElement('div');
            center.className = 'rose-center';
            bloom.appendChild(center);

            // Reduzido levemente para 15 pétalas: visual idêntico, 20% mais rápido no mobile
            const numPetals = 15; 
            
            for (let i = 0; i < numPetals; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                
                const rotZ = i * 137.5; 
                const progress = i / (numPetals - 1);
                const tiltX = 85 - (progress * 65);
                const size = 18 + (progress * 32); 
                
                petal.style.setProperty('--s', size + 'px');
                petal.style.transform = `rotateZ(${rotZ}deg) rotateX(${tiltX}deg)`;
                
                if(progress < 0.3) petal.style.filter = 'brightness(0.5)';
                else if (progress > 0.8) petal.style.filter = 'brightness(1.1)';

                bloom.appendChild(petal);
            }
            return bloom;
        }

        // 4. Distribuição Esférica do Buquê
        // 50 flores é o balanço perfeito de exuberância sem travar celulares
        const numFlowers = 50; 
        const stemLength = 260; 

        for (let i = 0; i < numFlowers; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flower-stem-wrapper';

            const progress = i / (numFlowers - 1);
            const angleY = i * 137.5; 
            const tilt = Math.pow(progress, 0.8) * 55; 

            wrapper.style.transform = `rotateY(${angleY}deg) rotateX(${tilt}deg)`;

            const stem = document.createElement('div');
            stem.className = 'stem';
            
            // Altura orgânica
            const h = stemLength + (Math.random() * 25 - 12);
            stem.style.setProperty('--h', h + 'px');

            const rose = createRose();
            rose.style.setProperty('--h', h + 'px');
            
            const randomSpin = Math.random() * 360;
            rose.style.transform = `rotateX(-90deg) rotateZ(${randomSpin}deg)`;

            wrapper.appendChild(stem);
            wrapper.appendChild(rose);
            bouquetPivot.appendChild(wrapper);
        }

        // 5. INTERATIVIDADE MASTERPIECE (Touch, Mouse e Giroscópio)
        let targetX = 15; 
        let targetY = 0;
        let currentX = 15;
        let currentY = 0;

        // Função universal para atualizar rotação
        function updateRotation(xNorm, yNorm) {
            targetY = xNorm * 35; // Gira esq/dir
            targetX = 15 - (yNorm * 20); // Inclina cima/baixo
        }

        // Para PC (Mouse)
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            const y = (e.clientY / window.innerHeight) * 2 - 1;
            updateRotation(x, y);
        });

        // Para Mobile (Toque)
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const x = (touch.clientX / window.innerWidth) * 2 - 1;
            const y = (touch.clientY / window.innerHeight) * 2 - 1;
            updateRotation(x, y);
        });

        // Para Mobile (Giroscópio - A magia final)
        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null && e.beta !== null) {
                // gamma: inclinação esq/dir (-90 a 90)
                // beta: inclinação frente/trás
                let xNorm = e.gamma / 45; // Normaliza
                let yNorm = (e.beta - 45) / 45; // Assume que o celular é segurado em ~45 graus
                
                // Limita valores entre -1 e 1
                xNorm = Math.max(-1, Math.min(1, xNorm));
                yNorm = Math.max(-1, Math.min(1, yNorm));
                
                updateRotation(xNorm, yNorm);
            }
        });

        // Loop de Animação Fluida (Lerp)
        function animateParallax() {
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;
            
            bouquetContainer.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
            requestAnimationFrame(animateParallax);
        }
        animateParallax();

        // 6. Responsividade Perfeita para iPhone/Android
        function handleResize() {
            // Ajusta o tamanho baseando-se na largura típica de um celular
            const baseWidth = window.innerWidth < 500 ? 400 : 700;
            const scale = Math.min(1.2, window.innerWidth / baseWidth);
            scene.style.transform = `scale(${scale})`;
            
            // Reposiciona o centro se o celular for muito baixo
            if(window.innerHeight < 700) {
                 scene.style.transform += ` translateY(50px)`;
            }
        }
        window.addEventListener('resize', handleResize);
        handleResize();

    </script>
</body>
</html>
